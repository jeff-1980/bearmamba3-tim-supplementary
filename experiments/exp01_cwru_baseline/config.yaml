name: exp01_cwru_baseline

# ── data ──────────────────────────────────────────────────────────
data_dir: ~/论文8/data/cwru_12k_de
channels: [DE]
win_len: 2048
stride: 1024
val_ratio: 0.2
batch_size: 64
num_workers: 4

# ── model ─────────────────────────────────────────────────────────
d_model: 64
d_state: 128
n_layers: 4
n_classes: 4
conv_stride: 2
# is_mimo always False (MIMO bwd unavailable on sm_86, max sharedmem=100KB)

# ── training ──────────────────────────────────────────────────────
epochs: 50
lr: 3.0e-4
weight_decay: 1.0e-4
grad_clip: 1.0
scheduler: cosine       # cosine annealing over epochs

# ── loss ──────────────────────────────────────────────────────────
lambda_kin: 0.0         # 0 = CE-only baseline; use config_kin.yaml for L_kin ablation
kin_variant: cover

# ── experiment ────────────────────────────────────────────────────
seeds: [0, 1, 2, 3, 4]
results_dir: ~/论文8/results/exp01_cwru_baseline
