name: exp_mext_e22_bm3bn_kin_cwru_snr-6
backbone: mamba3

# ── data ──────────────────────────────────────────────────────────
data_dir: ~/论文8/data/cwru_12k_de
channels: [DE]
win_len: 2048
stride: 1024
val_ratio: 0.2
label_mode: 4class
batch_size: 64
num_workers: 4

# ── model ─────────────────────────────────────────────────────────
d_model: 64
d_state: 128
n_layers: 4
n_classes: 4
conv_stride: 2
use_batchnorm: true

# ── training ──────────────────────────────────────────────────────
epochs: 50
lr: 3.0e-4
weight_decay: 1.0e-4
grad_clip: 1.0
scheduler: cosine

# ── loss ──────────────────────────────────────────────────────────
noise_snr_db: -6.0
lambda_kin: 0.01

# ── experiment ────────────────────────────────────────────────────
seeds: [0, 1, 2, 3, 4]
results_dir: ~/论文8/results/exp_mext_e22_bm3bn_kin_cwru_snr-6
