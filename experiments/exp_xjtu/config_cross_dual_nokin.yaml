name: exp_xjtu_cross_dual_nokin
mode: cross

# ── data ──────────────────────────────────────────────────────────
data_root: ~/data_xjtu/XJTU-SY_Bearing_Datasets
train_condition: "37.5Hz11kN"   # Cond2: 2250rpm
test_condition:  "40Hz10kN"     # Cond3: 2400rpm
window_size: 2048
n_sensors: 2          # horizontal + vertical (B4-5 dual-channel)
# ⚠️ Cond2 OR:IR ≈ 7.4:1 → DataLoader uses WeightedRandomSampler

# ── model ─────────────────────────────────────────────────────────
d_model: 64
d_state: 128
n_layers: 4
n_classes: 2          # OR=0, IR=1
conv_stride: 2

# ── training ──────────────────────────────────────────────────────
batch_size: 64
num_workers: 4
epochs: 50
lr: 3.0e-4
weight_decay: 1.0e-4
grad_clip: 1.0
scheduler: cosine

# ── loss ──────────────────────────────────────────────────────────
lambda_kin: 0.0
kin_variant: cover

# ── ⚠️ XJTU fs_eff assert (D26 mandatory) ─────────────────────────
fs_eff: 12800.0

# ── experiment ────────────────────────────────────────────────────
seeds: [0, 1, 2, 3, 4]
results_dir: ~/论文8/results/exp_xjtu_cross_dual_nokin
