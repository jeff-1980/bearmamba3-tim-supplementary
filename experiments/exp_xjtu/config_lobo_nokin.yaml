name: exp_xjtu_lobo_nokin
mode: lobo

# ── data ──────────────────────────────────────────────────────────
data_root: ~/data_xjtu/XJTU-SY_Bearing_Datasets
window_size: 2048
# stride = window_size (non-overlapping) — each 32768-point file gives 16 windows

# ── model ─────────────────────────────────────────────────────────
d_model: 64
d_state: 128
n_layers: 4
n_sensors: 1          # single horizontal channel
n_classes: 2          # OR=0, IR=1
conv_stride: 2

# ── training ──────────────────────────────────────────────────────
batch_size: 64
num_workers: 4
epochs: 50
lr: 3.0e-4
weight_decay: 1.0e-4
grad_clip: 1.0
scheduler: cosine

# ── loss ──────────────────────────────────────────────────────────
lambda_kin: 0.0
kin_variant: cover

# ── ⚠️ XJTU fs_eff assert (D26 mandatory) ─────────────────────────
# fs=25600 Hz, conv_stride=2 → fs_eff=12800 Hz
fs_eff: 12800.0

# ── experiment ────────────────────────────────────────────────────
seeds: [0, 1, 2, 3, 4]
results_dir: ~/论文8/results/exp_xjtu_lobo_nokin
