name: exp_xjtu_cross_kin
mode: cross

# ── data ──────────────────────────────────────────────────────────
data_root: ~/data_xjtu/XJTU-SY_Bearing_Datasets
train_condition: "37.5Hz11kN"   # Cond2: 2250rpm
test_condition:  "40Hz10kN"     # Cond3: 2400rpm
window_size: 2048

# ── model ─────────────────────────────────────────────────────────
d_model: 64
d_state: 128
n_layers: 4
n_sensors: 1
n_classes: 2
conv_stride: 2

# ── training ──────────────────────────────────────────────────────
batch_size: 64
num_workers: 4
epochs: 50
lr: 3.0e-4
weight_decay: 1.0e-4
grad_clip: 1.0
scheduler: cosine

# ── loss ──────────────────────────────────────────────────────────
lambda_kin: 0.01
kin_variant: cover
# XJTU-SY LDK UER204
bearing_kwargs:
  n_balls: 8
  d: 7.92
  D: 34.55

# ── ⚠️ XJTU fs_eff assert (D26 mandatory) ─────────────────────────
fs_eff: 12800.0

# ── experiment ────────────────────────────────────────────────────
seeds: [0, 1, 2, 3, 4]
results_dir: ~/论文8/results/exp_xjtu_cross_kin
